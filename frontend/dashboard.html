<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aqarak | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- SweetAlert2 للتنبيهات -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles/dashboard.css">
</head>
<body>

<div class="sidebar p-3">
    <div class="text-center mb-5 mt-3">
        <h3 class="fw-bold text-white">Aqarak</h3>
    </div>
    <ul class="nav flex-column">
        <li class="nav-item"><a href="index.html" class="nav-link"><i class="fa-solid fa-house me-2"></i> <span>Home</span></a></li>
        <li class="nav-item"><a href="dashboard.html" class="nav-link active"><i class="fa-solid fa-chart-line me-2"></i> <span>My Listings</span></a></li>
        <li class="nav-item"><a href="booking.html" class="nav-link"><i class="fa-solid fa-calendar-check me-2"></i> <span>Bookings</span></a></li>
        <li class="nav-item"><a href="add_property.html" class="nav-link"><i class="fa-solid fa-plus-circle me-2"></i> <span>Add New</span></a></li>
        <li class="nav-item mt-5">
            <a href="javascript:void(0)" onclick="handleLogout()" class="nav-link text-danger">
                <i class="fa-solid fa-right-from-bracket me-2"></i> <span>Logout</span>
            </a>
        </li>
    </ul>
</div>

<div class="main-content">
    <header class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h2 class="fw-bold mb-1">Property Dashboard</h2>
            <p class="text-muted">Welcome back! Manage your listings in Lebanon.</p>
        </div>
        <a href="add_property.html" class="btn btn-primary rounded-pill px-4 py-2 fw-bold">
            <i class="fa-solid fa-plus me-2"></i> New Listing
        </a>
    </header>

    <!-- Stats Summary -->
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="stat-card">
                <small class="text-muted fw-bold text-uppercase">Listed Properties</small>
                <h2 id="totalCount" class="fw-bold mb-0 mt-2">0</h2>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card" style="border-left-color: #f59e0b;">
                <small class="text-muted fw-bold text-uppercase">Requests</small>
                <h2 id="bookingCount" class="fw-bold mb-0 mt-2">CHECK NOW</h2>
            </div>
        </div>
    </div>

    <h4 class="fw-bold mb-4">My Properties</h4>
    
    <!-- Properties List -->
    <div id="myPropertiesContainer">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">Loading your properties...</p>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://127.0.0.1:8000";
    const token = localStorage.getItem('token');

    if (!token) window.location.href = "login.html";

    document.addEventListener('DOMContentLoaded', fetchMyProperties);

    async function fetchMyProperties() {
        try {
            const res = await fetch(`${API_URL}/my-properties`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const container = document.getElementById('myPropertiesContainer');
            
            document.getElementById('totalCount').innerText = data.length;

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="text-center p-5 bg-white rounded-4 border border-dashed">
                        <i class="fa-solid fa-house-chimney-user fa-3x text-muted mb-3"></i>
                        <h5 class="fw-bold">No Properties Found</h5>
                        <p class="text-muted">Start by adding your first real estate listing.</p>
                        <a href="add_property.html" class="btn btn-primary rounded-pill mt-2">Add Property</a>
                    </div>`;
                return;
            }

            container.innerHTML = data.map(p => `
                <div class="property-row">
                    <img src="${API_URL}${p.main_image || '/static/default.jpg'}" 
                         class="property-img" 
                         onerror="this.src='https://via.placeholder.com/150'">
                    
                    <div class="ms-4 flex-grow-1">
                        <h5 class="fw-bold mb-1">${p.title}</h5>
                        <div class="text-muted small">
                            <i class="fa-solid fa-location-dot me-1 text-primary"></i> ${p.city}
                        </div>
                    </div>

                    <div class="text-end me-5">
                        <div class="badge-price">$${p.price.toLocaleString()}</div>
                    </div>

                    <div class="d-flex gap-2">
                        <a href="edit_property.html?id=${p.id}" class="btn-circle text-primary" title="Edit">
                            <i class="fa-solid fa-pen"></i>
                        </a>
                        <button onclick="confirmDelete('${p.id}')" class="btn-circle text-danger" title="Delete">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');

        } catch (error) {
            container.innerHTML = `<div class="alert alert-danger">Error connecting to server.</div>`;
        }
    }

    function confirmDelete(id) {
        Swal.fire({
            title: 'Are you sure?',
            text: "This listing will be permanently removed!",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#ef4444',
            cancelButtonColor: '#64748b',
            confirmButtonText: 'Yes, delete it!'
        }).then(async (result) => {
            if (result.isConfirmed) {
                try {
                    const res = await fetch(`${API_URL}/properties/${id}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (res.ok) {
                        Swal.fire('Deleted!', 'Your property listing has been removed.', 'success');
                        fetchMyProperties();
                    }
                } catch (err) {
                    Swal.fire('Error', 'Something went wrong.', 'error');
                }
            }
        });
    }

    function handleLogout() {
        Swal.fire({
            title: 'Logout?',
            text: "Do you really want to sign out?",
            icon: 'question',
            showCancelButton: true,
            confirmButtonColor: '#0f172a',
            confirmButtonText: 'Logout'
        }).then((result) => {
            if (result.isConfirmed) {
                localStorage.removeItem('token');
                window.location.href = "index.html";
            }
        });
    }
</script>
</body>
</html>
