<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | Aqarak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles/profile.css">
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="fa-solid fa-house-chimney-auto me-2 text-primary"></i>Aqarak
        </a>
        <div class="ms-auto d-flex gap-2" id="nav-links">
            <a class="nav-link-custom" href="index.html"><i class="fa-solid fa-house"></i><span class="d-none d-md-inline">Home</span></a>
            <a class="nav-link-custom" href="favorites.html"><i class="fa-solid fa-heart"></i><span class="d-none d-md-inline">Favorites</span></a>
            <a class="nav-link-custom active" href="profile.html"><i class="fa-solid fa-user"></i><span class="d-none d-md-inline">Profile</span></a>
            <button onclick="logout()" class="btn btn-danger px-4 fw-bold ms-2" style="border-radius:12px;font-size:0.88rem;">Logout</button>
        </div>
    </div>
</nav>

<div class="container page-wrapper">

    <!-- ── Hero card ── -->
    <div class="hero-card">
        <div class="hero-banner"></div>
        <div class="hero-body">
            <div class="d-flex align-items-end gap-4 flex-wrap">
                <!-- Avatar -->
                <div class="avatar-wrap">
                    <img id="avatarPreview" class="avatar-img" src="" style="display:none;" alt="Avatar">
                    <div id="avatarPlaceholder" class="avatar-placeholder" style="display:none; background:#2563eb;">?</div>
                    <label for="avatarInput" class="cam-btn" title="Change photo">
                        <i class="fa-solid fa-camera" style="font-size:0.8rem;"></i>
                    </label>
                    <input type="file" id="avatarInput" hidden accept="image/*">
                </div>
                <!-- Name + role -->
                <div class="pb-2">
                    <h3 id="topName" class="fw-800 mb-1">Loading...</h3>
                    <span class="text-muted" id="topEmail" style="font-size:0.9rem;"></span>
                    <span id="topRole" class="role-pill">USER</span>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Personal Info ── -->
    <div class="section-card">
        <div class="section-title">
            <i class="fa-solid fa-user"></i> Personal Information
        </div>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="u_name" class="form-control" placeholder="Your name">
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Email Address <span class="text-muted fw-normal">(locked)</span></label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="text" id="u_email" class="form-control" readonly>
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-phone"></i>
                    <input type="text" id="u_phone" class="form-control" placeholder="+961 xx xxx xxx">
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label">Account Role</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-shield-halved"></i>
                    <input type="text" id="u_role" class="form-control" readonly>
                </div>
            </div>
        </div>
        <div class="mt-4">
            <button class="btn-save" id="saveInfoBtn" onclick="saveProfile()">
                <i class="fa-solid fa-floppy-disk"></i> Save Changes
            </button>
        </div>
    </div>

    <!-- ── Security ── -->
    <div class="section-card">
        <div class="section-title">
            <i class="fa-solid fa-lock"></i> Security & Password
        </div>
        <p class="text-muted" style="font-size:0.88rem; margin-top:-10px; margin-bottom:20px;">
            Leave blank if you don't want to change your password.
        </p>
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Current Password</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-key"></i>
                    <input type="password" id="old_pass" class="form-control" placeholder="Enter current password">
                </div>
            </div>
            <div class="col-md-6">
                <label class="form-label">New Password</label>
                <div class="input-icon-wrap">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="new_pass" class="form-control" placeholder="Enter new password">
                </div>
            </div>
        </div>
        <div class="mt-4">
            <button class="btn-save" id="savePassBtn" onclick="savePassword()" style="background:#1e293b;">
                <i class="fa-solid fa-shield-halved"></i> Update Password
            </button>
        </div>
    </div>

</div>

<script>
    const API_URL = 'http://127.0.0.1:8000';
    const token   = localStorage.getItem('token');

    if (!token) window.location.href = 'login.html';

    async function loadProfile() {
        try {
            const res = await fetch(`${API_URL}/users/me`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) throw new Error();
            const user = await res.json();

            document.getElementById('topName').innerText  = user.username;
            document.getElementById('topEmail').innerText = user.email;
            document.getElementById('u_name').value  = user.username;
            document.getElementById('u_email').value = user.email;
            document.getElementById('u_phone').value = user.phone || '';
            document.getElementById('u_role').value  = user.role.charAt(0).toUpperCase() + user.role.slice(1);

            // Role pill
            const pill = document.getElementById('topRole');
            pill.innerText = user.role.toUpperCase();
            pill.className = 'role-pill ' + user.role;

            // Avatar
            const img  = document.getElementById('avatarPreview');
            const phld = document.getElementById('avatarPlaceholder');
            if (user.profile_image) {
                img.src = `${API_URL}${user.profile_image}`;
                img.style.display = 'block';
                phld.style.display = 'none';
            } else {
                img.style.display = 'none';
                phld.style.display = 'flex';
                phld.innerText = user.username.charAt(0).toUpperCase();
                const colors = ['#2563eb','#7c3aed','#db2777','#059669','#ea580c'];
                phld.style.background = colors[user.id % colors.length];
            }
        } catch {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    }

    // Avatar preview on file select
    document.getElementById('avatarInput').onchange = function () {
        const [file] = this.files;
        if (!file) return;
        const img  = document.getElementById('avatarPreview');
        const phld = document.getElementById('avatarPlaceholder');
        img.src = URL.createObjectURL(file);
        img.style.display = 'block';
        phld.style.display = 'none';
    };

    async function saveProfile() {
        const btn = document.getElementById('saveInfoBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Saving...';

        try {
            // Update name + phone
            const fd = new FormData();
            fd.append('username', document.getElementById('u_name').value);
            fd.append('phone',    document.getElementById('u_phone').value);
            const res = await fetch(`${API_URL}/users/update-profile`, {
                method: 'PUT', headers: { 'Authorization': `Bearer ${token}` }, body: fd
            });
            if (!res.ok) throw new Error('Profile update failed');

            // Upload avatar if changed
            const avatarFile = document.getElementById('avatarInput').files[0];
            if (avatarFile) {
                const imgFd = new FormData();
                imgFd.append('file', avatarFile);
                await fetch(`${API_URL}/users/upload-avatar`, {
                    method: 'POST', headers: { 'Authorization': `Bearer ${token}` }, body: imgFd
                });
            }

            await Swal.fire({ icon: 'success', title: 'Profile Updated!', timer: 1800, showConfirmButton: false });
            location.reload();
        } catch (err) {
            Swal.fire('Error', err.message, 'error');
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> Save Changes';
    }

    async function savePassword() {
        const oldP = document.getElementById('old_pass').value;
        const newP = document.getElementById('new_pass').value;
        if (!oldP || !newP) {
            Swal.fire('Notice', 'Please fill in both password fields.', 'info');
            return;
        }
        const btn = document.getElementById('savePassBtn');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Updating...';

        try {
            const res = await fetch(`${API_URL}/users/change-password`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ old_password: oldP, new_password: newP })
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Password change failed');
            }
            await Swal.fire({ icon: 'success', title: 'Password Updated!', timer: 1800, showConfirmButton: false });
            document.getElementById('old_pass').value = '';
            document.getElementById('new_pass').value = '';
        } catch (err) {
            Swal.fire('Error', err.message, 'error');
        }
        btn.disabled = false;
        btn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> Update Password';
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    window.onload = loadProfile;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
