<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | Aqarak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles/login.css">
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>
<div class="blob blob-4"></div>
<div class="particles" id="particles"></div>

<div class="login-card">

    <div class="brand">
        <div class="brand-icon"><i class="fa-solid fa-house-chimney-auto"></i></div>
        <span class="brand-name">Aqarak</span>
    </div>

    <h2 class="login-title">Welcome back</h2>
    <p class="login-subtitle">Sign in to your account to continue</p>

    <form id="loginForm">
        <div class="field-group">
            <label class="field-label">Email Address</label>
            <div class="field-wrap">
                <i class="fa-solid fa-envelope"></i>
                <input type="email" id="email" class="field-input" placeholder="user@example.com" required>
            </div>
        </div>
        <div class="field-group">
            <label class="field-label">Password</label>
            <div class="field-wrap">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="password" class="field-input" placeholder="Enter your password" required>
            </div>
        </div>
        <button type="submit" id="loginBtn" class="btn-signin">
            <i class="fa-solid fa-right-to-bracket me-2"></i> Sign In
        </button>
    </form>

    <div class="divider">
        <div class="divider-line"></div>
        <span class="divider-text">or</span>
        <div class="divider-line"></div>
    </div>

    <div class="footer-link">
        Don't have an account? <a href="register.html">Create one free</a>
    </div>

</div>

<script>
const API_URL = 'https://aqarak-backend-vehj.onrender.com';

// Swal theme matching the project
const swalTheme = {
    background: 'rgba(15,23,42,0.95)',
    color: '#f1f5f9',
    confirmButtonColor: '#3b82f6',
    backdrop: 'rgba(0,0,0,0.7)'
};

// Particles
const pc = document.getElementById('particles');
for (let i = 0; i < 30; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.cssText = `left:${Math.random()*100}%;width:${Math.random()*3+2}px;height:${Math.random()*3+2}px;animation-duration:${Math.random()*10+8}s;animation-delay:${Math.random()*10}s;`;
    pc.appendChild(p);
}

document.getElementById('loginForm').onsubmit = async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const orig = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Signing in...';

    const fd = new FormData();
    fd.append('username', document.getElementById('email').value);
    fd.append('password', document.getElementById('password').value);

    try {
        const res = await fetch(`${API_URL}/login`, { method: 'POST', body: fd });
        if (res.ok) {
            const data = await res.json();
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('user_role', data.role);
            await Swal.fire({ ...swalTheme, icon: 'success', title: 'Welcome back!', text: 'Redirecting...', timer: 1300, showConfirmButton: false });
            window.location.href = data.role === 'admin' ? 'admin_dashboard.html' : 'index.html';
        } else {
            Swal.fire({ ...swalTheme, icon: 'error', title: 'Access Denied', text: 'Invalid email or password. Please try again.' });
        }
    } catch {
        Swal.fire({ ...swalTheme, icon: 'error', title: 'Connection Error', text: 'Could not reach the server.' });
    } finally {
        btn.disabled = false;
        btn.innerHTML = orig;
    }
};
</script>

</body>
</html>
