<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Booking Requests | Aqarak</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles/my_booking_requests.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="fa-solid fa-house-chimney-auto me-2 text-primary"></i>Aqarak
        </a>
        <div class="ms-auto d-flex gap-2">
            <a class="nav-link-custom" href="index.html"><i class="fa-solid fa-house"></i> <span class="d-none d-md-inline">Browse</span></a>
            <a class="nav-link-custom" href="favorites.html"><i class="fa-solid fa-heart"></i> <span class="d-none d-md-inline">Favorites</span></a>
            <a class="nav-link-custom active" href="my_booking_requests.html"><i class="fa-solid fa-calendar-check"></i> <span class="d-none d-md-inline">My Bookings</span></a>
        </div>
    </div>
</nav>

<div class="container py-5">

    <!-- Page header -->
    <div class="row align-items-center mb-4">
        <div class="col-md-6">
            <h2 class="fw-bold mb-1">My Booking Requests</h2>
            <p class="text-muted">Track your property viewing requests and their status.</p>
        </div>
        <div class="col-md-3 ms-auto">
            <div class="stats-card shadow-sm">
                <div class="stats-icon"><i class="fa-solid fa-calendar-check"></i></div>
                <div>
                    <h4 class="fw-bold mb-0" id="totalBookings">0</h4>
                    <small class="text-muted">Total Requests</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Filter tabs -->
    <ul class="nav nav-pills mb-4" id="filterTabs">
        <li class="nav-item"><button class="nav-link active" onclick="filterBy('all')">All</button></li>
        <li class="nav-item"><button class="nav-link" onclick="filterBy('pending')">Pending</button></li>
        <li class="nav-item"><button class="nav-link" onclick="filterBy('confirmed')">Confirmed</button></li>
        <li class="nav-item"><button class="nav-link" onclick="filterBy('cancelled')">Cancelled</button></li>
    </ul>

    <!-- Bookings grid -->
    <div id="bookingsList" class="row g-4">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">Loading your bookings...</p>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://aqarak-backend-vehj.onrender.com';
    const token   = localStorage.getItem('token');
    let allBookings = [];

    if (!token) window.location.href = 'login.html';

    async function fetchBookings() {
        try {
            const res = await fetch(`${API_URL}/my-booking-requests`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (!res.ok) throw new Error('Failed');
            allBookings = await res.json();
            document.getElementById('totalBookings').innerText = allBookings.length;
            renderBookings(allBookings);
        } catch (err) {
            document.getElementById('bookingsList').innerHTML = `
                <div class="col-12 text-center py-5 text-danger">
                    <i class="fa-solid fa-circle-exclamation fa-2x mb-3"></i>
                    <p>Could not load bookings. Make sure you are logged in.</p>
                </div>`;
        }
    }

    function filterBy(status) {
        // Update active tab
        document.querySelectorAll('#filterTabs .nav-link').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        const filtered = status === 'all' ? allBookings : allBookings.filter(b => (b.status || 'pending').toLowerCase() === status);
        renderBookings(filtered);
    }

    function renderBookings(bookings) {
        const container = document.getElementById('bookingsList');

        if (bookings.length === 0) {
            container.innerHTML = `
                <div class="col-12 empty-state">
                    <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png" alt="empty">
                    <h5 class="text-muted fw-semibold">No booking requests found</h5>
                    <p class="text-muted">Browse properties and book a viewing to get started.</p>
                    <a href="index.html" class="btn btn-primary rounded-pill px-4 mt-2">
                        <i class="fa-solid fa-magnifying-glass me-2"></i>Browse Properties
                    </a>
                </div>`;
            return;
        }

        container.innerHTML = bookings.map(b => {
            const status       = (b.status || 'pending').toLowerCase();
            const statusLabel  = status.charAt(0).toUpperCase() + status.slice(1);
            const isInstall    = b.payment_preference === 'Installments';
            const isPending    = status === 'pending';
            const paymentText  = isInstall ? `Installments (${b.install_years || '?'}y)` : 'Cash Payment';
            const paymentClass = isInstall ? 'pill-install' : 'pill-cash';
            const paymentIcon  = isInstall ? 'fa-clock-rotate-left' : 'fa-bolt';

            return `
            <div class="col-md-6 col-lg-4">
                <div class="booking-card">

                    <!-- Header band -->
                    <div class="card-header-band">
                        <div class="d-flex align-items-center gap-2">
                            <i class="fa-solid fa-calendar-days text-primary"></i>
                            <small class="text-muted fw-semibold">${escapeHtml(b.booking_date || '—')}</small>
                        </div>
                        <span class="status-badge status-${status}">${statusLabel}</span>
                    </div>

                    <div class="p-4">
                        <!-- Property name -->
                        <div class="property-tag">
                            <i class="fa-solid fa-location-dot text-primary"></i>
                            <span class="text-truncate">${escapeHtml(b.property_title || 'Property')}</span>
                        </div>

                        <!-- Info rows -->
                        <div class="info-row">
                            <i class="fa-solid fa-city"></i>
                            <span>${escapeHtml(b.property_city || '—')}</span>
                        </div>
                        <div class="info-row">
                            <i class="fa-solid fa-credit-card"></i>
                            <span class="payment-pill ${paymentClass}">
                                <i class="fa-solid ${paymentIcon}"></i> ${paymentText}
                            </span>
                        </div>
                        ${b.notes ? `<div class="info-row"><i class="fa-solid fa-note-sticky"></i><span>${escapeHtml(b.notes)}</span></div>` : ''}

                        <!-- Action buttons -->
                        <div class="d-grid gap-2 mt-3">
                            <button class="btn-action btn-view" onclick="viewProperty('${b.property_id}')">
                                <i class="fa-solid fa-arrow-up-right-from-square"></i> View Property
                            </button>
                            ${isPending ? `
                            <button class="btn-action btn-cancel" onclick="cancelBooking(${b.id})">
                                <i class="fa-solid fa-xmark"></i> Cancel Request
                            </button>` : `
                            <button class="btn-action btn-disabled" disabled>
                                <i class="fa-solid fa-lock"></i> ${status === 'confirmed' ? 'Confirmed — contact agent' : 'Cancelled'}
                            </button>`}
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
    }

    function viewProperty(propertyId) {
        window.location.href = `details.html?id=${propertyId}`;
    }

    async function cancelBooking(id) {
        const result = await Swal.fire({
            title: 'Cancel this booking?',
            text: 'This will remove your viewing request.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#e11d48',
            cancelButtonText: 'Keep it',
            confirmButtonText: 'Yes, cancel it'
        });
        if (!result.isConfirmed) return;

        const res = await fetch(`${API_URL}/bookings/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        if (res.ok) {
            Swal.fire('Cancelled', 'Your booking request has been removed.', 'success');
            fetchBookings();
        } else {
            Swal.fire('Error', 'Could not cancel. Please try again.', 'error');
        }
    }

    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    window.onload = fetchBookings;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
