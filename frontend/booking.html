<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Bookings | Aqarak</title>
    <!-- استيراد الخطوط والمكتبات الأساسية -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- SweetAlert2 للتنبيهات الاحترافية -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles/booking.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="fa-solid fa-house-chimney-auto me-2 text-primary"></i>Aqarak
        </a>
        <div class="ms-auto d-flex gap-2">
            <a class="nav-link-custom" href="dashboard.html"><i class="fa-solid fa-chart-pie"></i> <span class="d-none d-md-inline">Dashboard</span></a>
            <a class="nav-link-custom active" href="booking.html"><i class="fa-solid fa-calendar-check"></i> <span class="d-none d-md-inline">Bookings</span></a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <!-- Header Section -->
    <div class="row align-items-center mb-4">
        <div class="col-md-6">
            <h2 class="fw-bold mb-1">Manage Viewing Requests</h2>
            <p class="text-muted">Track and respond to potential buyers interested in your listings.</p>
        </div>
        <div class="col-md-3 ms-auto">
            <div class="stats-card shadow-sm">
                <div class="stats-icon"><i class="fa-solid fa-envelope-open-text"></i></div>
                <div>
                    <h4 class="fw-bold mb-0" id="totalRequests">0</h4>
                    <small class="text-muted">New Leads</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Bookings Grid -->
    <div id="bookingsList" class="row g-4">
        <div class="col-12 text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-muted">Retrieving your requests...</p>
        </div>
    </div>
</div>

<script>
    const API_URL = "http://127.0.0.1:8000";
    const token = localStorage.getItem('token');

    async function fetchBookings() {
        if (!token) { window.location.href = 'login.html'; return; }

        try {
            const res = await fetch(`${API_URL}/my-bookings`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            const container = document.getElementById('bookingsList');
            document.getElementById('totalRequests').innerText = data.length;

            if (data.length === 0) {
                container.innerHTML = `
                <div class="col-12 text-center py-5">
                    <img src="https://cdn-icons-png.flaticon.com/512/4076/4076549.png" width="120" class="mb-3 opacity-50">
                    <h5 class="text-muted">No viewing requests yet. Keep sharing your listings!</h5>
                </div>`;
                return;
            }

            container.innerHTML = data.map(b => {
                const isInstall = b.payment_preference === "Installments";
                const badgeClass = isInstall ? "badge-install" : "badge-cash";
                const paymentText = isInstall ? `Installments (${b.install_years}y)` : "Cash Payment";
                
                const status = (b.status || 'pending').toLowerCase();
                const statusConfig = {
                    pending:   { label: 'Pending',   color: '#854d0e', bg: '#fef9c3', icon: 'fa-clock' },
                    confirmed: { label: 'Confirmed', color: '#166534', bg: '#dcfce7', icon: 'fa-circle-check' },
                    cancelled: { label: 'Cancelled', color: '#991b1b', bg: '#fee2e2', icon: 'fa-circle-xmark' },
                };
                const sc = statusConfig[status] || statusConfig.pending;

                return `
                <div class="col-md-6 col-lg-4">
                    <div class="card booking-card p-4">
                        <button class="delete-trigger" onclick="confirmDelete(${b.id})">
                            <i class="fa-solid fa-trash-can"></i>
                        </button>

                        <div class="d-flex align-items-center mb-3">
                            <div class="avatar-circle">${(b.client_name || 'U').charAt(0).toUpperCase()}</div>
                            <div class="ms-3">
                                <h6 class="fw-bold mb-0">${b.client_name || 'Guest User'}</h6>
                                <div class="payment-badge ${badgeClass}">
                                    <i class="fa-solid ${isInstall ? 'fa-clock-rotate-left' : 'fa-bolt'}"></i> ${paymentText}
                                </div>
                            </div>
                            <span class="ms-auto" style="font-size:0.75rem;font-weight:700;padding:4px 12px;border-radius:20px;background:${sc.bg};color:${sc.color};">
                                <i class="fa-solid ${sc.icon} me-1"></i>${sc.label}
                            </span>
                        </div>

                        <div class="property-label text-truncate">
                            <i class="fa-solid fa-location-dot me-2 text-primary"></i> ${b.property_title}
                        </div>

                        <div class="info-row"><i class="fa-solid fa-envelope"></i> ${b.client_email}</div>
                        <div class="info-row"><i class="fa-solid fa-phone"></i> ${b.client_phone || 'No phone provided'}</div>
                        <div class="info-row"><i class="fa-solid fa-calendar-day"></i> Requested on ${b.date}</div>

                        <div class="btn-group-custom">
                            <button onclick="openWhatsApp('${b.client_phone}', '${b.client_name}', '${b.property_title}')" class="btn-comm btn-wa">
                                <i class="fa-brands fa-whatsapp"></i> WhatsApp
                            </button>
                            <button onclick="openGmail('${b.client_email}', '${b.client_name}', '${b.property_title}')" class="btn-comm btn-gm">
                                <i class="fa-solid fa-envelope"></i> Email
                            </button>
                        </div>

                        ${status !== 'confirmed' ? `
                        <button onclick="updateStatus(${b.id}, 'confirmed')" 
                            style="width:100%;margin-top:8px;padding:10px;border:none;border-radius:12px;background:#dcfce7;color:#166534;font-weight:700;cursor:pointer;font-size:0.88rem;transition:0.2s;"
                            onmouseover="this.style.background='#22c55e';this.style.color='white';"
                            onmouseout="this.style.background='#dcfce7';this.style.color='#166534';">
                            <i class="fa-solid fa-circle-check me-2"></i> Confirm Booking
                        </button>` : ''}

                        ${status !== 'cancelled' ? `
                        <button onclick="updateStatus(${b.id}, 'cancelled')"
                            style="width:100%;margin-top:6px;padding:10px;border:none;border-radius:12px;background:#fee2e2;color:#991b1b;font-weight:700;cursor:pointer;font-size:0.88rem;transition:0.2s;"
                            onmouseover="this.style.background='#ef4444';this.style.color='white';"
                            onmouseout="this.style.background='#fee2e2';this.style.color='#991b1b';">
                            <i class="fa-solid fa-circle-xmark me-2"></i> Cancel Booking
                        </button>` : ''}
                    </div>
                </div>`;
            }).join('');
        } catch (err) {
            console.error(err);
            Swal.fire('Error', 'Could not load bookings. Please check your connection.', 'error');
        }
    }

    async function updateStatus(id, status) {
        const label = status === 'confirmed' ? 'Confirm' : 'Cancel';
        const result = await Swal.fire({
            title: `${label} this booking?`,
            text: status === 'confirmed'
                ? 'The seeker will be notified that their booking is confirmed.'
                : 'The seeker will be notified that their booking is cancelled.',
            icon: status === 'confirmed' ? 'question' : 'warning',
            showCancelButton: true,
            confirmButtonColor: status === 'confirmed' ? '#22c55e' : '#ef4444',
            cancelButtonText: 'No',
            confirmButtonText: `Yes, ${label}`
        });
        if (!result.isConfirmed) return;

        try {
            const res = await fetch(`${API_URL}/bookings/${id}/status`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ status })
            });
            if (res.ok) {
                Swal.fire({
                    icon: 'success',
                    title: `Booking ${status}!`,
                    text: 'The seeker has been notified.',
                    timer: 1800,
                    showConfirmButton: false
                });
                fetchBookings();
            } else {
                const err = await res.json();
                Swal.fire('Error', err.detail || 'Could not update status', 'error');
            }
        } catch {
            Swal.fire('Error', 'Connection error', 'error');
        }
    }

    async function confirmDelete(id) {
        Swal.fire({
            title: 'Archive Request?',
            text: "This will remove the request from your active list.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#e11d48',
            confirmButtonText: 'Yes, remove it'
        }).then(async (result) => {
            if (result.isConfirmed) {
                const res = await fetch(`${API_URL}/bookings/${id}`, { 
                    method: 'DELETE', 
                    headers: { 'Authorization': `Bearer ${token}` } 
                });
                if(res.ok) {
                    Swal.fire('Removed!', 'The request has been archived.', 'success');
                    fetchBookings();
                }
            }
        });
    }

    function openWhatsApp(phone, name, prop) {
        if (!phone || phone === 'null') {
            Swal.fire('Notice', 'No phone number provided by the user.', 'info');
            return;
        }
        const msg = `Hello ${name}, I am contacting you regarding your viewing request for "${prop}" on Aqarak.`;
        window.open(`https://wa.me/${phone.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    function openGmail(email, name, prop) {
        const subject = `Update on your Viewing Request: ${prop}`;
        const body = `Hi ${name},\n\nThank you for your interest in the property "${prop}". I would like to discuss more details with you.\n\nBest regards.`;
        window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${email}&su=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`, '_blank');
    }

    window.onload = fetchBookings;
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
