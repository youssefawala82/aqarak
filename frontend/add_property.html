    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
    const API_URL = 'https://aqarak-backend-vehj.onrender.com';
    
    var map = L.map('map').setView([33.8938, 35.5018], 10); 
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '©️ OpenStreetMap'
    }).addTo(map);

    var marker;

    map.on('click', async function(e) {
        const { lat, lng } = e.latlng;
        if (marker) marker.setLatLng(e.latlng);
        else marker = L.marker(e.latlng).addTo(map);
        document.getElementById('lat').value = lat;
        document.getElementById('lng').value = lng;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`);
            const data = await res.json();
            const cityName = data.address.city || data.address.town || data.address.village || data.address.suburb || "Lebanon";
            document.getElementById('city').value = cityName;
        } catch (err) { console.error("Geocoding error"); }
    });

    document.getElementById('city').addEventListener('change', async function() {
        const cityName = this.value;
        if (cityName.length < 3) return;
        try {
            const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${cityName}, Lebanon`);
            const data = await res.json();
            if (data.length > 0) {
                const lat = parseFloat(data[0].lat);
                const lon = parseFloat(data[0].lon);
                const newPos = [lat, lon];
                map.setView(newPos, 13);
                if (marker) marker.setLatLng(newPos);
                else marker = L.marker(newPos).addTo(map);
                document.getElementById('lat').value = lat;
                document.getElementById('lng').value = lon;
            }
        } catch (err) { console.log("City search error"); }
    });

    // Main Image Logic
    const input = document.getElementById('main_image');
    const preview = document.getElementById('preview');
    const zone = document.getElementById('dropZone');

    zone.onclick = () => input.click();
    input.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { 
                preview.src = ev.target.result; 
                preview.classList.remove('d-none'); 
                document.getElementById('dropZoneContent').classList.add('d-none');
            };
            reader.readAsDataURL(file);
        }
    };

    document.getElementById('aiSuggestBtn').onclick = async () => {
        const area     = document.getElementById('area').value;
        const city     = document.getElementById('city').value;
        const type     = document.getElementById('property_type').value;
        const bedrooms = document.getElementById('bedrooms').value || 0;
        const bathrooms= document.getElementById('bathrooms').value || 0;
        const lat      = document.getElementById('lat').value;
        const feedback = document.getElementById('aiFeedback');

        if (!area || !city) {
            Swal.fire({ icon: 'warning', title: 'Missing Info', text: 'Please enter the area and city first.', confirmButtonColor: '#3b82f6' });
            return;
        }

        feedback.innerHTML = `<span class="spinner-border spinner-border-sm text-primary me-2"></span> AI is analyzing...`;

        const fd = new FormData();
        fd.append('area',          area);
        fd.append('city',          city);
        fd.append('property_type', type);
        fd.append('bedrooms',      bedrooms);
        fd.append('bathrooms',     bathrooms);
        if (lat) { fd.append('lat', lat); fd.append('lng', document.getElementById('lng').value); }

        try {
            const res  = await fetch(`${API_URL}/ai/predict-price`, { method: 'POST', body: fd });
            const data = await res.json();
            if (res.ok) {
                const price = Math.round(data.suggested_price).toLocaleString();
                document.getElementById('price').value = Math.round(data.suggested_price);
                feedback.innerHTML = `
                    <div class="alert alert-success py-2 px-3 small shadow-sm">
                        <i class="fa-solid fa-robot me-1"></i>
                        <strong>AI Suggested: $${price}</strong>
                        &nbsp;|&nbsp; ${data.region_detected} &nbsp;|&nbsp; 
                        Type ×${data.type_multiplier} &nbsp;|&nbsp;
                        Beds ${data.bedroom_bonus} &nbsp;|&nbsp; 
                        Baths ${data.bathroom_bonus}
                    </div>`;
            } else {
                feedback.innerHTML = `<div class="alert alert-danger py-2 small">AI unavailable. Please try again.</div>`;
            }
        } catch {
            feedback.innerHTML = `<div class="alert alert-danger py-2 small">Connection error.</div>`;
        }
    };

    document.getElementById('addPropertyForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const token = localStorage.getItem('token');
        
        if (!token) { 
            Swal.fire({
                icon: 'error',
                title: 'Not Logged In',
                text: 'Please login to publish a listing.',
                confirmButtonColor: '#2759c4'
            }).then(() => {
                window.location.href = 'login.html';
            });
            return; 
        }
        
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span> Publishing...`;
        
        const propertyData = {
            title: document.getElementById('title').value,
            description: document.getElementById('description').value || "No description",
            price: parseFloat(document.getElementById('price').value),
            area: parseFloat(document.getElementById('area').value),
            bedrooms: parseInt(document.getElementById('bedrooms').value) || 0,
            bathrooms: parseInt(document.getElementById('bathrooms').value) || 0,
            property_type: document.getElementById('property_type').value,
            city: document.getElementById('city').value,
            address: document.getElementById('city').value,
            lat: parseFloat(document.getElementById('lat').value),
            lng: parseFloat(document.getElementById('lng').value)
        };

        try {
            const response = await fetch(`${API_URL}/properties/`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(propertyData)
            });
            const result = await response.json();
            
            if (response.ok) {
                const imgFile = input.files[0];
                if (imgFile) {
                    const imgData = new FormData();
                    imgData.append('file', imgFile);
                    await fetch(`${API_URL}/properties/${result.id}/upload-image/`, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}` },
                        body: imgData
                    });
                }

                Swal.fire({
                    icon: 'success',
                    title: 'Published!',
                    text: 'Your property has been listed successfully.',
                    confirmButtonColor: '#2759c4'
                }).then(() => {
                    window.location.href = 'dashboard.html';
                });

            } else { 
                Swal.fire({
                    icon: 'error',
                    title: 'Failed to Publish',
                    text: result.detail || "Something went wrong"
                });
            }
        } catch (err) { 
            Swal.fire({
                icon: 'error',
                title: 'Connection Error',
                text: 'Could not connect to the server.'
            });
        }
        finally { btn.disabled = false; btn.innerHTML = `<i class="fa-solid fa-check-circle me-2"></i> Publish Listing`; }
    };
</script>
