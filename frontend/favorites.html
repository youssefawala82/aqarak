<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Favorites | Aqarak</title>

    <!-- المكتبات الأساسية — نفس الترتيب مثل index.html -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles/favorites.css">
</head>
<body>

<!-- ====================================================================
     1) NAVBAR — شريط التنقل (نفس index.html)
     ==================================================================== -->
<nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background:#0f172a !important; padding:1rem 0; box-shadow:0 4px 20px rgba(0,0,0,0.1);">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">
            <i class="fa-solid fa-house-chimney-auto me-2 text-primary"></i>Aqarak
        </a>
        <div class="ms-auto d-flex gap-2 align-items-center" id="nav-controls"></div>
    </div>
</nav>


<!-- ====================================================================
     2) PAGE HEADER — هيدر الصفحة
     ==================================================================== -->
<section class="page-header">
    <div class="container">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-3">
            <div>
                <h1><i class="bi bi-heart-fill me-2" style="color: #f87171;"></i>My Favorites</h1>
                <p>Properties you've saved for later</p>
            </div>
            <span class="favorites-count-badge" id="favCount" style="display: none;">
                <i class="bi bi-bookmark-fill me-1"></i> <span id="favCountNum">0</span> saved
            </span>
        </div>
    </div>
</section>


<!-- ====================================================================
     3) FAVORITES GRID — شبكة المفضلة
     ==================================================================== -->
<div class="container py-5">

    <!-- حالة التحميل -->
    <div class="loading-spinner" id="loadingState">
        <div class="spinner-border text-primary mb-3" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <p class="text-muted">Loading your favorites...</p>
    </div>

    <!-- شبكة البطاقات -->
    <div class="row g-4" id="favoritesGrid" style="display: none;"></div>

    <!-- حالة فارغة -->
    <div id="emptyState" style="display: none;">
        <div class="empty-state">
            <div class="empty-state-icon">
                <i class="bi bi-heart"></i>
            </div>
            <h4 class="fw-bold text-dark mb-2">No favorites yet</h4>
            <p class="text-muted mb-4">You haven't saved any properties yet.<br>Browse listings and tap the heart icon to save them here.</p>
            <a href="index.html" class="btn btn-primary btn-lg rounded-pill px-4">
                <i class="bi bi-search me-2"></i>Browse Properties
            </a>
        </div>
    </div>
</div>


<!-- ====================================================================
     SCRIPTS
     ==================================================================== -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "http://127.0.0.1:8000";


    // =================================================================
    //  HELPERS — دوال مساعدة
    // =================================================================

    function getToken() {
        return localStorage.getItem('access_token') || localStorage.getItem('token');
    }

    function getUserRole() {
        const t = getToken();
        if (!t) return null;
        try {
            const payload = JSON.parse(atob(t.split('.')[1]));
            return payload.role || null;
        } catch { return null; }
    }

    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }


    // =================================================================
    //  NAVBAR — تحديث الروابط حسب حالة تسجيل الدخول
    // =================================================================

    function updateNavbar() {
        const navControls = document.getElementById('nav-controls');
        const token     = getToken();
        const userRole  = getUserRole();
        const navStyle  = 'color:rgba(255,255,255,0.85);font-weight:500;padding:0.55rem 1.1rem;border-radius:12px;transition:0.3s;display:flex;align-items:center;gap:7px;text-decoration:none;';

        if (token) {
            let links = '';
            if (userRole === 'admin') {
                links = `
                    <a href="dashboard.html"       style="${navStyle}" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background=''""><i class="fa-solid fa-chart-line"></i><span class="d-none d-md-inline">Dashboard</span></a>
                    <a href="admin_dashboard.html" style="${navStyle}" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background=''"><i class="fa-solid fa-gauge-high"></i><span class="d-none d-md-inline">Admin</span></a>
                    <a href="add_property.html"    style="${navStyle};border:1px solid rgba(255,255,255,0.3);" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background=''"><i class="fa-solid fa-plus"></i><span class="d-none d-md-inline">Add Property</span></a>`;
            } else if (userRole === 'agent') {
                links = `
                    <a href="dashboard.html"    style="${navStyle}" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background=''"><i class="fa-solid fa-chart-line"></i><span class="d-none d-md-inline">Dashboard</span></a>
                    <a href="add_property.html" style="${navStyle};border:1px solid rgba(255,255,255,0.3);" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background=''"><i class="fa-solid fa-plus"></i><span class="d-none d-md-inline">Add Property</span></a>`;
            } else {
                links = `
                    <a href="my_booking_requests.html" style="${navStyle}" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background=''"><i class="fa-solid fa-calendar-check"></i><span class="d-none d-md-inline">My Bookings</span></a>`;
            }
            navControls.innerHTML = `
                <div class="d-flex align-items-center gap-1">
                    <a href="index.html"    style="${navStyle}" onmouseover="this.style.background='rgba(255,255,255,0.1)'" onmouseout="this.style.background=''"><i class="fa-solid fa-house"></i><span class="d-none d-md-inline">Home</span></a>
                    <a href="favorites.html" style="${navStyle};background:rgba(255,255,255,0.12);" ><i class="fa-solid fa-heart"></i><span class="d-none d-md-inline">Favorites</span></a>
                    ${links}
                    <button onclick="doLogout()" class="btn btn-danger px-3 fw-bold ms-1" style="border-radius:12px;font-size:0.85rem;">Logout</button>
                </div>`;
        } else {
            navControls.innerHTML = `<a href="login.html" class="btn btn-primary px-4 fw-bold" style="border-radius:12px;background:#3b82f6;border:none;">Login / Register</a>`;
        }
    }

    function doLogout() {
        localStorage.removeItem('access_token');
        localStorage.removeItem('token');
        localStorage.removeItem('user_role');
        localStorage.removeItem('user_name');
        window.location.href = 'login.html';
    }


    // =================================================================
    //  LOAD FAVORITES — تحميل المفضلة
    // =================================================================

    async function loadFavorites() {
        const token = getToken();
        if (!token) {
            window.location.href = 'login.html';
            return;
        }

        const loadingEl  = document.getElementById('loadingState');
        const gridEl     = document.getElementById('favoritesGrid');
        const emptyEl    = document.getElementById('emptyState');
        const countBadge = document.getElementById('favCount');
        const countNum   = document.getElementById('favCountNum');

        loadingEl.style.display = 'flex';
        gridEl.style.display    = 'none';
        emptyEl.style.display   = 'none';

        try {
            const res = await fetch(API_URL + '/my-favorites', {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const data = await res.json();

            loadingEl.style.display = 'none';

            if (!data || data.length === 0) {
                emptyEl.style.display    = 'block';
                countBadge.style.display = 'none';
                return;
            }

            countNum.textContent     = data.length;
            countBadge.style.display = 'inline-block';

            gridEl.innerHTML     = '';
            gridEl.style.display = 'flex';

            data.forEach(function (p, index) {
                var title = escapeHtml(p.title);
                var city  = escapeHtml(p.city);
                var type  = escapeHtml(p.property_type || '');
                var price = p.price ? '$' + Number(p.price).toLocaleString() : 'N/A';
                var img   = p.main_image ? (API_URL + p.main_image) : '';
                var beds  = p.bedrooms  ? '<span><i class="bi bi-door-open"></i> ' + p.bedrooms + ' bd</span>'  : '';
                var baths = p.bathrooms ? '<span><i class="bi bi-droplet"></i> ' + p.bathrooms + ' ba</span>'   : '';
                var area  = p.area      ? '<span><i class="bi bi-arrows-fullscreen"></i> ' + p.area + ' m²</span>' : '';

                var col = document.createElement('div');
                col.className = 'col-md-6 col-lg-4 fade-in-card';
                col.id = 'card-' + p.id;
                col.style.animationDelay = (index * 0.08) + 's';

                col.innerHTML =
                    '<div class="card aqar-card border-0 shadow-sm h-100">' +
                        '<div class="position-relative">' +
                            (img
                                ? '<img src="' + img + '" class="card-img-top" alt="' + title + '">'
                                : '<div class="card-img-top bg-secondary d-flex align-items-center justify-content-center" style="height:220px"><i class="bi bi-image text-white fs-1"></i></div>') +
                            '<span class="property-badge"><i class="bi bi-geo-alt-fill me-1"></i>' + city + '</span>' +
                            '<button class="btn-remove-fav" onclick="removeFromFavorites(\'' + p.id + '\')" title="Remove from favorites">' +
                                '<i class="fa-solid fa-heart-crack"></i>' +
                            '</button>' +
                        '</div>' +
                        '<div class="card-body d-flex flex-column p-3">' +
                            (type ? '<span class="badge bg-light text-primary border border-primary-subtle mb-2" style="width:fit-content; font-weight:600;">' + type + '</span>' : '') +
                            '<h6 class="fw-bold text-truncate mb-1">' + title + '</h6>' +
                            '<div class="property-meta mb-3">' + beds + baths + area + '</div>' +
                            '<div class="mt-auto d-flex justify-content-between align-items-center">' +
                                '<span class="fs-5 fw-bold text-primary">' + price + '</span>' +
                                '<a href="details.html?id=' + p.id + '" class="btn btn-outline-primary btn-sm rounded-pill px-3">View Details</a>' +
                            '</div>' +
                        '</div>' +
                    '</div>';

                gridEl.appendChild(col);
            });

        } catch (error) {
            loadingEl.style.display = 'none';
            console.error('Load Favorites Error:', error);
            Swal.fire('Error', 'Could not load your favorites. Please try again.', 'error');
        }
    }


    // =================================================================
    //  REMOVE FROM FAVORITES — حذف من المفضلة
    // =================================================================

    async function removeFromFavorites(propId) {
        var result = await Swal.fire({
            title: 'Remove from favorites?',
            text: 'This property will be removed from your saved list.',
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc3545',
            cancelButtonColor: '#6c757d',
            confirmButtonText: 'Yes, remove it',
            cancelButtonText: 'Cancel'
        });

        if (!result.isConfirmed) return;

        try {
            var token = getToken();
            var res = await fetch(API_URL + '/properties/' + propId + '/favorite', {
                method: 'POST',
                headers: { 'Authorization': 'Bearer ' + token }
            });

            var data = await res.json();

            if (data.status === 'removed') {
                var cardEl = document.getElementById('card-' + propId);
                if (cardEl) {
                    cardEl.style.transition = 'all 0.4s ease';
                    cardEl.style.opacity = '0';
                    cardEl.style.transform = 'scale(0.9) translateY(20px)';

                    setTimeout(function () {
                        cardEl.remove();

                        var remaining  = document.querySelectorAll('#favoritesGrid .col-md-6').length;
                        var countNum   = document.getElementById('favCountNum');
                        var countBadge = document.getElementById('favCount');
                        countNum.textContent = remaining;

                        if (remaining === 0) {
                            countBadge.style.display = 'none';
                            document.getElementById('favoritesGrid').style.display = 'none';
                            document.getElementById('emptyState').style.display = 'block';
                        }
                    }, 400);
                }

                Swal.fire({
                    icon: 'success',
                    title: 'Removed!',
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 2000
                });
            }
        } catch (err) {
            console.error('Remove error:', err);
            Swal.fire('Error', 'Could not connect to server.', 'error');
        }
    }
    // =================================================================
    //  INIT — تهيئة الصفحة
    // =================================================================

    document.addEventListener('DOMContentLoaded', function () {
        updateNavbar();
        loadFavorites();
    });
</script>
</body>
</html>
